<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GPCA Smart Weather System</title>

<link rel="icon" href="/favicon.png">

<style>
body{
font-family:Arial;
margin:0;
background:#f4f6f8;
text-align:center;
}

.container{
padding:30px;
}

.card{
background:white;
margin:10px auto;
padding:15px;
border-radius:10px;
width:320px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h1{margin-bottom:5px;}
.status{font-weight:bold;}
</style>
</head>

<body>

<div class="container">

<h1>GPCA Smart Weather System</h1>
<p>Cloud Monitoring Dashboard • v1.0.0</p>

<div class="card">
<h2 id="temp">-- °C</h2>
<p class="status" id="status">Checking...</p>
<p id="updated">Updated --</p>
</div>

<div class="card">
<p>Humidity</p>
<h3 id="humidity">-- %</h3>
</div>

<div class="card">
<p>Wind Speed</p>
<h3 id="wind">-- km/h</h3>
</div>

<div class="card">
<p>Visibility</p>
<h3 id="visibility">-- %</h3>
</div>

<div class="card">
<p>Rain Status</p>
<h3 id="rain">--</h3>
</div>

</div>

<!-- 🔊 ALERT SOUND -->
<audio id="alertSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>
let lastAlert="";

async function fetchData(){
try{
const res=await fetch("/api/latest");
const data=await res.json();

if(data.device_status==="Offline"){
document.getElementById("status").innerText="🔴 Device Offline";
document.getElementById("updated").innerText="Updated --";
return;
}

document.getElementById("temp").innerText=data.temperature+" °C";
document.getElementById("humidity").innerText=data.humidity+" %";
document.getElementById("wind").innerText=data.wind_speed+" km/h";
document.getElementById("visibility").innerText=data.visibility+" %";
document.getElementById("rain").innerText=data.rain;

document.getElementById("status").innerText="🟢 Device Online";
document.getElementById("updated").innerText="Updated just now";

// 🔊 alert sound
if(data.alert && data.alert!=="Normal" && data.alert!==lastAlert){
document.getElementById("alertSound").play();
lastAlert=data.alert;
}

}catch(e){
document.getElementById("status").innerText="Offline";
}
}

setInterval(fetchData,3000);
fetchData();
</script>

</body>
</html>
