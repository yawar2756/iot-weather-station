<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPCA Smart Weather System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);color:white}
.header{background:rgba(0,0,0,0.4);padding:15px 30px;display:flex;justify-content:space-between;align-items:center}
.export-btn{background:#28a745;padding:8px 15px;border-radius:6px;color:white;text-decoration:none;font-size:13px}
.container{max-width:1200px;margin:auto;padding:30px}
.hero{text-align:center;margin-bottom:30px}
.temperature{font-size:72px;font-weight:700}
.trend{font-size:18px;margin-top:5px}
.status{margin-top:10px;font-weight:bold}
.update-time{margin-top:6px;font-size:13px;opacity:0.7}
.grid{display:grid;gap:20px}
.kpi-grid{grid-template-columns:repeat(auto-fit,minmax(220px,1fr));margin-bottom:30px}
.analytics-grid{grid-template-columns:repeat(auto-fit,minmax(250px,1fr));margin-bottom:30px}
.card{background:rgba(255,255,255,0.08);padding:20px;border-radius:15px;backdrop-filter:blur(15px);text-align:center}
.chart-section{background:rgba(255,255,255,0.08);padding:20px;border-radius:15px;height:420px}
.alert{display:none;margin-top:15px;padding:14px;border-radius:12px;font-weight:bold;animation:pulse 1.2s infinite}
.alert-danger{background:linear-gradient(135deg,#ff4d4d,#cc0000);box-shadow:0 0 20px rgba(255,0,0,0.7)}
.alert-warning{background:linear-gradient(135deg,#ffb347,#ff8000);box-shadow:0 0 20px rgba(255,140,0,0.6)}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.03)}100%{transform:scale(1)}}
</style>
</head>

<body>

<div class="header">
<div>
<h1>GPCA Smart Weather System</h1>
<span>Cloud Monitoring Dashboard • v1.0.0</span>
</div>
<a href="/api/export" class="export-btn">⬇ Export Last 7 Days</a>
</div>

<div class="container">

<div class="hero">
<div class="temperature" id="temp">-- °C</div>
<div class="trend" id="trend">➖ Stable</div>
<div id="deviceStatus" class="status">Checking...</div>
<div class="update-time" id="updateTime">Updated --</div>
<div id="liveClock" style="margin-top:6px;font-size:14px;opacity:0.8"></div>
<div id="alertBox" class="alert"></div>
</div>

<div class="grid kpi-grid">
<div class="card"><h3>Humidity</h3><p id="hum">-- %</p></div>
<div class="card"><h3>Wind Speed</h3><p id="windSpeed">-- km/h</p></div>
<div class="card"><h3>Visibility</h3><p id="visibility">-- %</p></div>
<div class="card"><h3>Rain Status</h3><p id="rain">--</p></div>
</div>

<div class="grid analytics-grid">
<div class="card"><h3>Min Temperature</h3><p id="minTemp">-- °C</p></div>
<div class="card"><h3>Max Temperature</h3><p id="maxTemp">-- °C</p></div>
<div class="card"><h3>Average Temperature</h3><p id="avgTemp">-- °C</p></div>
</div>

<div class="chart-section">
<label>📅 View Mode:</label>
<select id="chartMode" onchange="loadChart()">
<option value="hourly">Last 12 Hours</option>
<option value="daily">Last 7 Days</option>
</select>
<canvas id="tempChart"></canvas>
</div>

</div>

<script>

let chart;
let lastUpdateTime=null;
let lastAlert="";

const alertSound=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

// ⏱ counter
function updateCounter(){
if(!lastUpdateTime)return;
const sec=Math.floor((Date.now()-lastUpdateTime)/1000);
document.getElementById("updateTime").innerText="Updated "+sec+"s ago";
}
setInterval(updateCounter,1000);

// 🌡 fetch data
async function fetchData(){

const res=await fetch("/api/latest");
const data=await res.json();
if(data.message)return;

if(data.device_status==="Offline"){
document.getElementById("deviceStatus").innerText="🔴 Device Offline";
return;
}

document.getElementById("deviceStatus").innerText="🟢 Device Online";
lastUpdateTime=Date.now();

document.getElementById("temp").innerText=data.temperature?Number(data.temperature).toFixed(1)+" °C":"-- °C";
document.getElementById("hum").innerText=data.humidity?Number(data.humidity).toFixed(0)+" %":"-- %";
document.getElementById("windSpeed").innerText=data.wind_speed?Number(data.wind_speed).toFixed(1)+" km/h":"-- km/h";
document.getElementById("visibility").innerText=data.visibility?Number(data.visibility).toFixed(0)+" %":"-- %";
document.getElementById("rain").innerText=data.rain??"--";

document.getElementById("minTemp").innerText=data.min_temp?Number(data.min_temp).toFixed(1)+" °C":"-- °C";
document.getElementById("maxTemp").innerText=data.max_temp?Number(data.max_temp).toFixed(1)+" °C":"-- °C";
document.getElementById("avgTemp").innerText=data.avg_temp?Number(data.avg_temp).toFixed(1)+" °C":"-- °C";

document.getElementById("trend").innerText=data.trend==="Rising"?"📈 Rising":data.trend==="Falling"?"📉 Falling":"➖ Stable";

const alertBox=document.getElementById("alertBox");

if(data.alert && data.alert!=="Normal"){
alertBox.style.display="block";
alertBox.className="alert "+(data.alert.includes("Storm")||data.alert.includes("Heat")?"alert-danger":"alert-warning");
alertBox.innerText="⚠ "+data.alert+" — Take Precaution";

if(data.alert!==lastAlert){
alertSound.play();
lastAlert=data.alert;
}

}else{
alertBox.style.display="none";
}

}

// 📊 chart
async function loadChart(){

const mode=document.getElementById("chartMode").value;
const res=await fetch("/api/history?mode="+mode);
const data=await res.json();

if(!data||data.length===0)return;

const temps=data.map(d=>d.temperature??null);

const times=data.map(d=>{
const date=new Date(d.time);
return mode==="hourly"
?date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
:date.toLocaleDateString();
});

const ctx=document.getElementById("tempChart");
if(chart)chart.destroy();

chart=new Chart(ctx,{
type:"line",
data:{labels:times,datasets:[{
label:"Temperature (°C)",
data:temps,
borderColor:"#ff4d4d",
backgroundColor:"rgba(255,77,77,0.2)",
borderWidth:3,
tension:0.3,
fill:true
}]},
options:{responsive:true,maintainAspectRatio:false,
plugins:{legend:{labels:{color:"#fff"}}},
scales:{x:{ticks:{color:"#fff"}},y:{ticks:{color:"#fff"}}}}
});

}

// 🕒 live clock
function liveClock(){
const now=new Date();
document.getElementById("liveClock").innerText="🕒 "+now.toLocaleTimeString();
}

// 🚀 load
window.onload=function(){

fetchData();
loadChart();

liveClock();
setInterval(liveClock,1000);

};

// 👁 tab change refresh
document.addEventListener("visibilitychange", ()=>{
if(!document.hidden) fetchData();
});

setInterval(fetchData,10000);

</script>

</body>
</html>
