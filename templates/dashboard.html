<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GPCA Smart Weather System</title>
<link rel="icon" href="/favicon.png">

<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#1f4037,#99f2c8);
color:white;
text-align:center;
}

.container{
padding:25px;
}

h1{margin-bottom:5px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-top:20px;
}

.card{
background:rgba(255,255,255,0.15);
padding:20px;
border-radius:12px;
backdrop-filter:blur(6px);
}

.big{
font-size:40px;
font-weight:bold;
}

.status{
font-weight:bold;
margin-top:10px;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
background:white;
cursor:pointer;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>🌦 GPCA Smart Weather System</h1>
<p>Cloud Monitoring Dashboard • v2.0</p>

<a href="/api/export"><button>⬇ Export Last 7 Days</button></a>

<div class="grid">

<div class="card">
<div class="big" id="temp">-- °C</div>
<div id="status">Checking...</div>
</div>

<div class="card">
Humidity
<h2 id="humidity">-- %</h2>
</div>

<div class="card">
Wind Speed
<h2 id="wind">-- km/h</h2>
</div>

<div class="card">
Visibility
<h2 id="visibility">-- %</h2>
</div>

<div class="card">
Rain Status
<h2 id="rain">--</h2>
</div>

</div>

<p id="updated">Updated --</p>

</div>

<audio id="alertSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>
let lastAlert="";

async function fetchData(){
try{
const res=await fetch("/api/latest");
const data=await res.json();

if(data.device_status==="Offline"){
document.getElementById("status").innerText="🔴 Device Offline";
return;
}

document.getElementById("temp").innerText=data.temperature+" °C";
document.getElementById("humidity").innerText=data.humidity+" %";
document.getElementById("wind").innerText=data.wind_speed+" km/h";
document.getElementById("visibility").innerText=data.visibility+" %";
document.getElementById("rain").innerText=data.rain;

document.getElementById("status").innerText="🟢 Device Online";
document.getElementById("updated").innerText="Updated just now";

if(data.alert && data.alert!=="Normal" && data.alert!==lastAlert){
document.getElementById("alertSound").play();
lastAlert=data.alert;
}

}catch(e){
document.getElementById("status").innerText="Offline";
}
}

setInterval(fetchData,3000);
fetchData();
</script>

</body>
</html>
